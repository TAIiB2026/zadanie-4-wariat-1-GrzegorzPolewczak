<div style="margin-bottom: 20px;">
    <label for="search">Szukaj po nazwie: </label>
    <input 
        id="search"
        type="text" 
        [(ngModel)]="searchName" 
        (input)="onSearch()" 
        placeholder="Wpisz nazwę...">
</div>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Nazwa</th>
            <th>Cena</th>
            <th>Data ważności</th>
            <th>Edycja</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let d of (data$ | async)">
            <td>{{d.id}}</td>
            <td>{{d.nazwa}}</td>
            <td>{{d.cena | currency:'PLN'}}</td>
            <td>{{d.dataWaznosci | date:"shortDate"}}</td>
            <td><a [routerLink]="d.id + ''">Przejdź do edycji</a></td>
            <button (click)="onDelete(d.id)">Usuń</button>
        </tr>
    </tbody>
</table>

<a routerLink="/dodawanie">Przejdź do dodawania</a>
